services:
  # ─── Base de datos PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: lacuerda_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-la_cuerda_offline_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-la_cuerda_offline_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Aplicación (backend + frontend compilado) ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lacuerda_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-la_cuerda_offline_db}
      PORT: ${APP_PORT:-3004}
    ports:
      - "${APP_PORT:-3004}:${APP_PORT:-3004}"

volumes:
  postgres_data:
    name: lacuerda_postgres_data
